name = "unwrap-server"
main = "src/index.tsx"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[assets]
# Tailwind-compiled CSS + future static files. Served by the Workers
# runtime ahead of the Worker code; reference as /global.css from pages.
directory = "./public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "fdda984b911c42afaedcca48ed5d73b9"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b705fd7215b2446ba50f8af60af8128f"

# Cloudflare Browser Rendering — gives the worker a real Chromium
# instance to replay generated specs. Workers free plan = 10 browser-
# minutes / day, which is enough for development.
[browser]
binding = "BROWSER"

# Cron triggers for synthetic monitoring. Fires every 15 minutes — each
# monitor decides per-tick whether it's due (so a 24h interval only
# actually runs every 24h). Note: Cloudflare crons only fire on the
# *deployed* Worker, never against `wrangler dev`.
[triggers]
crons = ["*/15 * * * *"]

# Production secrets — set via:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put GEMINI_API_KEY
#   wrangler secret put JWT_SECRET
# (do not put them in this file or in .dev.vars committed to git)

[vars]
# Comma-separated list of email domains/addresses allowed to sign in. Empty = allow any Google account.
ALLOWED_EMAILS = "orange881217@gmail.com,ryan.y@protopie.io"
# The extension's redirect URL used in launchWebAuthFlow. Must match the
# extension's chromiumapp.org URL — set after first build via:
#   chrome.identity.getRedirectURL()
EXTENSION_REDIRECT_URL = ""
# Gemini model. gemini-2.5-flash works on the free tier (vision-capable);
# gemini-2.5-pro is highest quality but currently requires billing to be enabled on the GCP project.
GEMINI_MODEL = "gemini-2.5-flash"
# Public origin used by the scheduled cron handler when constructing
# links in Slack alerts (cron events have no incoming request).
MONITOR_PUBLIC_ORIGIN = "https://unwrap-server.orange881217.workers.dev"
