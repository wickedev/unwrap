name = "unwrap-server"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "fdda984b911c42afaedcca48ed5d73b9"

# Production secrets — set via:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put GEMINI_API_KEY
#   wrangler secret put JWT_SECRET
# (do not put them in this file or in .dev.vars committed to git)

[vars]
# Comma-separated list of email domains/addresses allowed to sign in. Empty = allow any Google account.
ALLOWED_EMAILS = "orange881217@gmail.com,ryan.y@protopie.io"
# The extension's redirect URL used in launchWebAuthFlow. Must match the
# extension's chromiumapp.org URL — set after first build via:
#   chrome.identity.getRedirectURL()
EXTENSION_REDIRECT_URL = ""
# Gemini model. gemini-2.5-flash works on the free tier (vision-capable);
# gemini-2.5-pro is highest quality but currently requires billing to be enabled on the GCP project.
GEMINI_MODEL = "gemini-2.5-flash"
